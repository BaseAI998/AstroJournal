name: astro_journal
description: "AstroJournal: 魔法书功能的离线优先日记与情绪回顾工具"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  
  # 路由
  go_router: ^12.1.1
  
  # 本地数据库
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # 图表
  fl_chart: ^0.65.0
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.2.2
  web: ^0.5.1
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # 代码生成
  build_runner: ^2.4.7
  drift_dev: ^2.14.0
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false 
  # 暂时不上线ios
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#1E1E1E"
    theme_color: "#1E1E1E"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
  image_path: "assets/icon.png"
